  smartauth.database:
    image: postgres:latest
    container_name: SmartAuth.Database
    environment:
      - POSTGRES_DB=smart_auth_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - smartauth-db:/var/lib/postgresql
    ports:
      - 5432:5432

  smartauth.identity:
    image: quay.io/keycloak/keycloak:latest
    container_name: SmartAuth.Identity
    command: start-dev #--import-realm
    environment:
      - KC_HEALTH_ENABLED=true
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./.containers/identity:/opt/keycloak/data
      - ./.files:/opt/keycloak/import
    ports:
      - 18080:8080

volumes:
  smartauth-db: